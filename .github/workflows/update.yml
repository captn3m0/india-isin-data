name: Update Data
on:
  schedule:
    # 12:30 UTC = 18:00 IST, Mon-Fri only (NSDL doesn't publish on weekends)
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    name: Update data and database
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.head_ref }}

    - uses: astral-sh/setup-uv@v8.0.0
      with:
        python-version: "3.14"

    - name: Run update (fetch latest db, fetch ISINs, fetch details, load into db)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: make update

    - name: Auto-commit metadata files
      uses: stefanzweifel/git-auto-commit-action@v4
      id: auto-commit
      with:
        commit_message: Update ISIN Data
        commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
        file_pattern: "CITATION.cff datapackage.json"

    - name: Create release
      if: steps.auto-commit.outputs.changes_detected == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: make release
